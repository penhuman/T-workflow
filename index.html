<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒T字法 - 每日工作計畫</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React 核心庫 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- 載入 Babel 讓瀏覽器可以直接編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 圖示元件 (使用 SVG 替代原本的 lucide-react 以便單檔執行) ---
    const CalendarIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    );
    const RotateCcwIcon = ({ size = 18, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
    );
    const CheckSquareIcon = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
    );
    const SquareIcon = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
    );
    const Trash2Icon = ({ size = 18, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
    );
    const PlusIcon = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    );

    // --- 主應用程式 ---
    function App() {
      // 取得今天的日期
      const today = new Date();
      const dateString = `${today.getFullYear()}/${String(today.getMonth() + 1).padStart(2, '0')}/${String(today.getDate()).padStart(2, '0')}`;

      // 預設資料 (參考朱騏的圖片範例)
      const initialMustDo = [
        { id: 'm1', text: '完成專案企劃草稿', done: false },
        { id: 'm2', text: '回覆客戶郵件', done: false }
      ];

      const initialNiceToDo = [
        { id: 'n1', text: '整理上週會議紀錄', done: false },
        { id: 'n2', text: '更新專案進度表', done: false },
        { id: 'n3', text: '檢查文件連結', done: false },
        { id: 'n4', text: '研究新工具功能', done: false }
      ];

      const initialSchedule = {
        8: '檢視信件 / 今日安排',
        9: '專案企劃草稿',
        10: '專案企劃草稿',
        11: '回覆客戶郵件',
        12: '午餐休息 ◡̈',
        13: '追蹤專案回饋',
        14: '更新專案進度表',
        15: '整理上週會議紀錄',
        16: '檢查文件連結',
        17: '明日工作準備 / 收尾',
        18: ''
      };

      const [mustDo, setMustDo] = useState(initialMustDo);
      const [niceToDo, setNiceToDo] = useState(initialNiceToDo);
      const [schedule, setSchedule] = useState(initialSchedule);
      
      const [newMustDo, setNewMustDo] = useState('');
      const [newNiceToDo, setNewNiceToDo] = useState('');

      // 處理任務勾選
      const toggleTask = (listType, id) => {
        if (listType === 'must') {
          setMustDo(mustDo.map(task => task.id === id ? { ...task, done: !task.done } : task));
        } else {
          setNiceToDo(niceToDo.map(task => task.id === id ? { ...task, done: !task.done } : task));
        }
      };

      // 處理刪除任務
      const deleteTask = (listType, id) => {
        if (listType === 'must') {
          setMustDo(mustDo.filter(task => task.id !== id));
        } else {
          setNiceToDo(niceToDo.filter(task => task.id !== id));
        }
      };

      // 新增任務
      const addTask = (listType, e) => {
        e.preventDefault();
        const newTaskObj = { id: Date.now().toString(), done: false };
        
        if (listType === 'must' && newMustDo.trim() !== '') {
          setMustDo([...mustDo, { ...newTaskObj, text: newMustDo.trim() }]);
          setNewMustDo('');
        } else if (listType === 'nice' && newNiceToDo.trim() !== '') {
          setNiceToDo([...niceToDo, { ...newTaskObj, text: newNiceToDo.trim() }]);
          setNewNiceToDo('');
        }
      };

      // 處理時間軸文字變更
      const handleScheduleChange = (hour, value) => {
        setSchedule({ ...schedule, [hour]: value });
      };

      // 重置計畫表
      const resetPlanner = () => {
        if (window.confirm('確定要清空今天的計畫表嗎？')) {
          setMustDo([]);
          setNiceToDo([]);
          const emptySchedule = {};
          for(let i=8; i<=18; i++) emptySchedule[i] = '';
          setSchedule(emptySchedule);
        }
      };

      // 渲染任務列表元件
      const TaskList = ({ tasks, type, newTaskText, setNewTaskText, onSubmit, placeholder }) => (
        <div className="flex-1 flex flex-col">
          <ul className="flex-1 space-y-3 mb-4">
            {tasks.map(task => (
              <li key={task.id} className="flex items-start group">
                <button onClick={() => toggleTask(type, task.id)} className="mt-1 mr-3 text-gray-500 hover:text-gray-800 transition-colors focus:outline-none">
                  {task.done ? <CheckSquareIcon size={20} className="text-gray-800" /> : <SquareIcon size={20} />}
                </button>
                <span className={`flex-1 text-lg ${task.done ? 'line-through text-gray-400' : 'text-gray-800'}`}>
                  {task.text}
                </span>
                <button 
                  onClick={() => deleteTask(type, task.id)}
                  className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-opacity ml-2 focus:outline-none"
                >
                  <Trash2Icon size={18} />
                </button>
              </li>
            ))}
          </ul>
          <form onSubmit={(e) => onSubmit(type, e)} className="relative mt-auto mb-2">
            <input
              type="text"
              value={newTaskText}
              onChange={(e) => setNewTaskText(e.target.value)}
              placeholder={placeholder}
              className="w-full bg-transparent border-b border-gray-300 py-2 pl-2 pr-8 focus:outline-none focus:border-gray-800 transition-colors"
            />
            <button type="submit" className="absolute right-0 top-2 text-gray-400 hover:text-gray-800 disabled:opacity-50" disabled={!newTaskText.trim()}>
              <PlusIcon size={20} />
            </button>
          </form>
        </div>
      );

      return (
        <div className="min-h-screen bg-stone-100 flex items-center justify-center py-10 px-4 font-sans text-gray-800">
          {/* 模擬一張白紙的容器 */}
          <div className="w-full max-w-3xl bg-[#fcfbfa] shadow-2xl rounded-sm overflow-hidden relative border border-stone-200">
            
            {/* 頂部 Header */}
            <div className="flex justify-between items-end px-8 pt-8 pb-4 border-b-[3px] border-stone-800">
              <div>
                <h1 className="text-2xl font-bold tracking-wider text-stone-800 flex items-center gap-2">
                  <CalendarIcon size={24} />
                  每日工作計畫 <span className="text-sm font-normal text-stone-500 ml-2">(倒 T 字法)</span>
                </h1>
              </div>
              <div className="flex items-center gap-4 text-stone-600 font-medium">
                <span className="text-lg font-mono">{dateString}</span>
                <button onClick={resetPlanner} className="text-stone-400 hover:text-stone-800 transition-colors" title="清空計畫表">
                  <RotateCcwIcon size={18} />
                </button>
              </div>
            </div>

            {/* 倒 T 字法的上班半部：左右分隔 */}
            <div className="flex flex-col sm:flex-row min-h-[300px]">
              {/* 左邊：今天必做 */}
              <div className="flex-1 flex flex-col p-8 sm:border-r-[3px] border-stone-800 border-b-[3px] sm:border-b-0">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 relative">
                  今天必做
                  <span className="text-xs bg-stone-800 text-white px-2 py-0.5 rounded-full">1-2件</span>
                  <div className="absolute -bottom-2 left-0 w-16 h-1 bg-stone-300"></div>
                </h2>
                <TaskList 
                  tasks={mustDo} 
                  type="must" 
                  newTaskText={newMustDo} 
                  setNewTaskText={setNewMustDo} 
                  onSubmit={addTask}
                  placeholder="新增必做事項..."
                />
              </div>

              {/* 右邊：有空再做 */}
              <div className="flex-1 flex flex-col p-8">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 relative text-stone-600">
                  有空再做
                  <span className="text-xs border border-stone-400 text-stone-500 px-2 py-0.5 rounded-full">3-5件</span>
                  <div className="absolute -bottom-2 left-0 w-16 h-1 bg-stone-200"></div>
                </h2>
                <TaskList 
                  tasks={niceToDo} 
                  type="nice" 
                  newTaskText={newNiceToDo} 
                  setNewTaskText={setNewNiceToDo} 
                  onSubmit={addTask}
                  placeholder="新增次要事項..."
                />
              </div>
            </div>

            {/* 倒 T 字法的下半部：時間軸 (水平分隔線) */}
            <div className="border-t-[3px] border-stone-800 bg-[#fdfbf9] p-8">
              <div className="max-w-xl mx-auto space-y-1">
                {Object.keys(schedule).map((hour) => (
                  <div key={hour} className="flex items-start group">
                    {/* 左側時間標籤 */}
                    <div className="w-16 flex-shrink-0 flex items-center justify-end pr-4 py-3 relative border-r-2 border-stone-300 text-stone-500 font-bold font-mono text-lg">
                      {hour}
                      <div className="absolute right-[-2px] top-1/2 w-3 h-0.5 bg-stone-300 -translate-y-1/2"></div>
                    </div>
                    
                    {/* 右側輸入框 */}
                    <div className="flex-1 pl-6 py-2">
                      <input
                        type="text"
                        value={schedule[hour]}
                        onChange={(e) => handleScheduleChange(hour, e.target.value)}
                        placeholder="點擊輸入工作安排..."
                        className="w-full bg-transparent text-lg border-b border-transparent hover:border-stone-200 focus:border-stone-400 focus:outline-none transition-colors py-1 text-stone-700"
                      />
                    </div>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // 啟動 React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
