<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒T字法 - 每日工作計畫</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 核心庫 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- 載入 Babel 讓瀏覽器可以直接編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 載入 Firebase SDK (使用 Compat 版本以便於單一 HTML 使用) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDortz50K5erw_NEfQVu8FgMddCde_TFvw",
    authDomain: "t-workflow-daily.firebaseapp.com",
    projectId: "t-workflow-daily",
    storageBucket: "t-workflow-daily.firebasestorage.app",
    messagingSenderId: "548572301818",
    appId: "1:548572301818:web:cbcc0e89b8acb01f557c43",
    measurementId: "G-9Y5Y1SVHKK"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // Firebase 設定 (已帶入你的專屬金鑰)
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyDortz5OK5erw_NEFQVu8FgMddCde_TFvw",
      authDomain: "t-workflow-daily.firebaseapp.com",
      projectId: "t-workflow-daily",
      storageBucket: "t-workflow-daily.firebasestorage.app",
      messagingSenderId: "548572301818",
      appId: "1:548572301818:web:cbcc0e89b8acb01f557c43",
      measurementId: "G-9Y5Y1SVHKK"
    };

    // 初始化 Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // ==========================================
    // SVG 圖示元件
    // ==========================================
    const CalendarIcon = ({ size = 24, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> );
    const RotateCcwIcon = ({ size = 18, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg> );
    const CheckSquareIcon = ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg> );
    const SquareIcon = ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg> );
    const Trash2Icon = ({ size = 18, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg> );
    const PlusIcon = ({ size = 20, className = "" }) => ( <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg> );

    // ==========================================
    // 獨立的任務列表元件 (避免輸入法中斷)
    // ==========================================
    const TaskList = ({ tasks, type, newTaskText, setNewTaskText, onSubmit, placeholder, toggleTask, deleteTask }) => (
      <div className="flex-1 flex flex-col">
        <ul className="flex-1 space-y-3 mb-4">
          {tasks.map(task => (
            <li key={task.id} className="flex items-start group">
              <button onClick={() => toggleTask(type, task.id)} className="mt-1 mr-3 text-gray-500 hover:text-gray-800 transition-colors focus:outline-none">
                {task.done ? <CheckSquareIcon size={20} className="text-gray-800" /> : <SquareIcon size={20} />}
              </button>
              <span className={`flex-1 text-lg ${task.done ? 'line-through text-gray-400' : 'text-gray-800'}`}>{task.text}</span>
              <button onClick={() => deleteTask(type, task.id)} className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-opacity ml-2 focus:outline-none">
                <Trash2Icon size={18} />
              </button>
            </li>
          ))}
        </ul>
        <form onSubmit={(e) => onSubmit(type, e)} className="relative mt-auto mb-2">
          <input type="text" value={newTaskText} onChange={(e) => setNewTaskText(e.target.value)} placeholder={placeholder} className="w-full bg-transparent border-b border-gray-300 py-2 pl-2 pr-8 focus:outline-none focus:border-gray-800 transition-colors" />
          <button type="submit" className="absolute right-0 top-2 text-gray-400 hover:text-gray-800 disabled:opacity-50" disabled={!newTaskText.trim()}>
            <PlusIcon size={20} />
          </button>
        </form>
      </div>
    );

    // ==========================================
    // 主應用程式
    // ==========================================
    function App() {
      // 取得今天日期，並以 YYYY-MM-DD 作為 Firebase 的 Document ID
      const today = new Date();
      const docId = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
      const docRef = db.collection('dailyPlanners').doc(docId);
      
      const dateString = docId.replace(/-/g, '/');

      // 建立空的預設時間表 (8點到18點)
      const getEmptySchedule = () => {
        const s = {};
        for(let i=8; i<=18; i++) s[i] = '';
        return s;
      };

      // 狀態管理
      const [mustDo, setMustDo] = useState([]);
      const [niceToDo, setNiceToDo] = useState([]);
      const [schedule, setSchedule] = useState(getEmptySchedule());
      
      const [newMustDo, setNewMustDo] = useState('');
      const [newNiceToDo, setNewNiceToDo] = useState('');
      
      const [isLoaded, setIsLoaded] = useState(false);
      const [saveStatus, setSaveStatus] = useState('連接中...');

      // 1. 首次載入：從 Firebase 讀取今天的資料
      useEffect(() => {
        docRef.get().then((doc) => {
          if (doc.exists) {
            const data = doc.data();
            setMustDo(data.mustDo || []);
            setNiceToDo(data.niceToDo || []);
            setSchedule(data.schedule || getEmptySchedule());
          }
          setIsLoaded(true);
          setSaveStatus('已同步');
        }).catch((err) => {
          console.error("讀取失敗:", err);
          setIsLoaded(true); 
          setSaveStatus('讀取失敗(請檢查資料庫規則)');
        });
      }, []);

      // 2. 自動存檔機制：防抖動 (Debounce) 設計，停頓 1 秒後上傳
      useEffect(() => {
        if (!isLoaded) return; // 還沒載入完不要觸發存檔
        
        setSaveStatus('同步中...');
        const timer = setTimeout(() => {
          docRef.set({
            mustDo,
            niceToDo,
            schedule,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true })
          .then(() => setSaveStatus('已同步'))
          .catch((err) => {
            console.error('儲存失敗', err);
            setSaveStatus('同步失敗(請檢查資料庫規則)');
          });
        }, 1000);

        // 清除上一個計時器，避免頻繁寫入
        return () => clearTimeout(timer);
      }, [mustDo, niceToDo, schedule, isLoaded]);

      // --- 處理功能 ---
      const toggleTask = (listType, id) => {
        if (listType === 'must') setMustDo(mustDo.map(t => t.id === id ? { ...t, done: !t.done } : t));
        else setNiceToDo(niceToDo.map(t => t.id === id ? { ...t, done: !t.done } : t));
      };

      const deleteTask = (listType, id) => {
        if (listType === 'must') setMustDo(mustDo.filter(t => t.id !== id));
        else setNiceToDo(niceToDo.filter(t => t.id !== id));
      };

      const addTask = (listType, e) => {
        e.preventDefault();
        const newTaskObj = { id: Date.now().toString(), done: false };
        if (listType === 'must' && newMustDo.trim()) {
          setMustDo([...mustDo, { ...newTaskObj, text: newMustDo.trim() }]);
          setNewMustDo('');
        } else if (listType === 'nice' && newNiceToDo.trim()) {
          setNiceToDo([...niceToDo, { ...newTaskObj, text: newNiceToDo.trim() }]);
          setNewNiceToDo('');
        }
      };

      const handleScheduleChange = (hour, value) => {
        setSchedule({ ...schedule, [hour]: value });
      };

      const resetPlanner = () => {
        if (window.confirm('確定要清空今天的計畫表嗎？')) {
          setMustDo([]);
          setNiceToDo([]);
          setSchedule(getEmptySchedule());
        }
      };

      // 載入畫面
      if (!isLoaded) {
        return <div className="min-h-screen bg-stone-100 flex items-center justify-center font-sans text-stone-500 text-lg">正在連接雲端資料庫...</div>;
      }

      // 主畫面渲染
      return (
        <div className="min-h-screen bg-stone-100 flex items-center justify-center py-10 px-4 font-sans text-gray-800">
          <div className="w-full max-w-3xl bg-[#fcfbfa] shadow-2xl rounded-sm overflow-hidden relative border border-stone-200">
            
            {/* 頂部 Header */}
            <div className="flex justify-between items-end px-8 pt-8 pb-4 border-b-[3px] border-stone-800">
              <div>
                <h1 className="text-2xl font-bold tracking-wider text-stone-800 flex items-center gap-2">
                  <CalendarIcon size={24} />
                  每日工作計畫 <span className="text-sm font-normal text-stone-500 ml-2">(倒 T 字法)</span>
                </h1>
              </div>
              <div className="flex flex-col items-end gap-1">
                <div className="flex items-center gap-4 text-stone-600 font-medium">
                  <span className="text-lg font-mono">{dateString}</span>
                  <button onClick={resetPlanner} className="text-stone-400 hover:text-stone-800 transition-colors" title="清空計畫表">
                    <RotateCcwIcon size={18} />
                  </button>
                </div>
                {/* 狀態顯示 */}
                <span className={`text-xs font-mono ${saveStatus.includes('失敗') ? 'text-red-500' : 'text-stone-400'}`}>
                  {saveStatus}
                </span>
              </div>
            </div>

            {/* 倒 T 字法的上半部：左右分隔 */}
            <div className="flex flex-col sm:flex-row min-h-[300px]">
              
              {/* 左邊：今天必做 */}
              <div className="flex-1 flex flex-col p-8 sm:border-r-[3px] border-stone-800 border-b-[3px] sm:border-b-0">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 relative">
                  今天必做
                  <span className="text-xs bg-stone-800 text-white px-2 py-0.5 rounded-full">1-2件</span>
                  <div className="absolute -bottom-2 left-0 w-16 h-1 bg-stone-300"></div>
                </h2>
                <TaskList 
                  tasks={mustDo} 
                  type="must" 
                  newTaskText={newMustDo} 
                  setNewTaskText={setNewMustDo} 
                  onSubmit={addTask} 
                  placeholder="新增必做事項..." 
                  toggleTask={toggleTask} 
                  deleteTask={deleteTask} 
                />
              </div>

              {/* 右邊：有空再做 */}
              <div className="flex-1 flex flex-col p-8">
                <h2 className="text-xl font-bold mb-6 flex items-center gap-2 relative text-stone-600">
                  有空再做
                  <span className="text-xs border border-stone-400 text-stone-500 px-2 py-0.5 rounded-full">3-5件</span>
                  <div className="absolute -bottom-2 left-0 w-16 h-1 bg-stone-200"></div>
                </h2>
                <TaskList 
                  tasks={niceToDo} 
                  type="nice" 
                  newTaskText={newNiceToDo} 
                  setNewTaskText={setNewNiceToDo} 
                  onSubmit={addTask} 
                  placeholder="新增次要事項..." 
                  toggleTask={toggleTask} 
                  deleteTask={deleteTask} 
                />
              </div>
            </div>

            {/* 倒 T 字法的下半部：時間軸 */}
            <div className="border-t-[3px] border-stone-800 bg-[#fdfbf9] p-8">
              <div className="max-w-xl mx-auto space-y-1">
                {Object.keys(schedule).map((hour) => (
                  <div key={hour} className="flex items-start group">
                    <div className="w-16 flex-shrink-0 flex items-center justify-end pr-4 py-3 relative border-r-2 border-stone-300 text-stone-500 font-bold font-mono text-lg">
                      {hour}
                      <div className="absolute right-[-2px] top-1/2 w-3 h-0.5 bg-stone-300 -translate-y-1/2"></div>
                    </div>
                    <div className="flex-1 pl-6 py-2">
                      <input 
                        type="text" 
                        value={schedule[hour]} 
                        onChange={(e) => handleScheduleChange(hour, e.target.value)} 
                        placeholder="點擊輸入工作安排..." 
                        className="w-full bg-transparent text-lg border-b border-transparent hover:border-stone-200 focus:border-stone-400 focus:outline-none transition-colors py-1 text-stone-700" 
                      />
                    </div>
                  </div>
                ))}
              </div>
            </div>

          </div>
        </div>
      );
    }

    // 啟動 React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
